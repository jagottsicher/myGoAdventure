name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: macos-amd64
          - goos: darwin
            goarch: arm64
            suffix: macos-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o adventure-${{ matrix.suffix }}${{ matrix.ext }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adventure-${{ matrix.suffix }}
          path: adventure-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Adventure ${{ github.ref_name }}
          generate_release_notes: true
          files: binaries/*
          body: |
            ## Installation

            Download the binary for your platform and run it in a terminal.

            | File | Platform |
            |------|----------|
            | `adventure-linux-amd64` | Linux x86_64 |
            | `adventure-linux-arm64` | Linux ARM64 |
            | `adventure-macos-amd64` | macOS Intel |
            | `adventure-macos-arm64` | macOS Apple Silicon |
            | `adventure-windows-amd64.exe` | Windows (PowerShell) |

            ### macOS — Gatekeeper notice

            macOS will block unsigned binaries on first launch. Run this once in your terminal before starting the game:

            ```sh
            xattr -d com.apple.quarantine ./adventure-macos-*
            ```

            Alternatively: right-click the file in Finder → Open → confirm.

            ---
